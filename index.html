<!DOCTYPE html>
<html>
<head>
  <title>🩸</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .tela-login {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #ff4da6;
      color: pink;
      cursor: pointer;
    }

    .conteudo {
      display: none;
      padding: 30px;
    }

    img {
      width: 200px;
      border-radius: 15px;
      margin: 10px;
    }
  </style>
</head>
<body>

<div class="tela-login">
  <h2> só você pode entrar... mas SÓ se conseguir, heheh</h2>
  <input type="password" id="senha" placeholder="digite a senha...">
  <button onclick="entrar()">entrar</button>
  <p id="erro" style="color:red;"></p>
</div>

<div class="conteudo" id="site">
  <h1>feliz aniversário 🎂</h1>
  <p>tentei programar só pra você… então aproveita ;) </p>

  <div>
  <p>📅 12/03/2024</p>
  <img src="https://i.imgur.com/WjzD9qE.jpeg">
  <p>testandooo</p>
</div>

<div>
  <p>📅 05/07/2024</p>
  <img src="https://i.imgur.com/LjGpbMm.jpeg">
  <p>aaaaaaaaaatesteee</p>
</div>

  <br><br>

  <button onclick="mensagem()">clica aqui</button>

  <p id="msg" style="display:none; margin-top:20px;">
    teste de novo
  </p>
</div>

<script>
  function entrar() {
    var senha = document.getElementById("senha").value;

    if (senha === "29/12") {
      document.querySelector(".tela-login").style.display = "none";
      document.getElementById("site").style.display = "block";
    } else {
      document.getElementById("erro").innerText = "senha errada 😡";
    }
  }

  function mensagem() {
    document.getElementById("msg").style.display = "block";
  }
</script>

</body>
</html>
