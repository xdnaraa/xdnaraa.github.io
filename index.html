<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    .tela-login {
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    input {
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #ff4da6;
      color: white;
      cursor: pointer;
    }

    .conteudo {
      display: none;
      padding: 30px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
    }

    .caixa {
      background: #111;
      padding: 20px;
      border-radius: 16px;
      width: 80%;
      max-width: 700px;
      position: relative;
      overflow: hidden;
    }

    .fechar {
      position: absolute;
      right: 15px;
      top: 10px;
      cursor: pointer;
      font-size: 22px;
    }

    .carrossel {
      display: flex;
      transition: transform 0.5s ease;
    }

    .paused {
      filter: blur(2px);
    }

    .foto {
      min-width: 100%;
      padding: 10px;
      box-sizing: border-box;
    }

    .polaroid {
      background: white;
      color: black;
      padding: 10px 10px 20px;
      border-radius: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .polaroid img {
      width: 100%;
      border-radius: 8px;
    }

    .data {
      font-size: 13px;
      margin-top: 8px;
    }

    .descricao {
      margin-top: 8px;
      font-size: 14px;
      font-style: italic;
      min-height: 20px;
    }

    .seta {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 28px;
      cursor: pointer;
      user-select: none;
    }

    .esq { left: 10px; }
    .dir { right: 10px; }

    #status {
      color: #ff4da6;
      font-weight: bold;
    }

    #timer {
      opacity: 0.7;
      font-size: 13px;
    }
  </style>
</head>

<script>

let index = 0;
let autoPlay = null;
let pausado = false;
let tempo = 0;
let timerInterval = null;

/* LOGIN */
function entrar() {
  const senha = document.getElementById("senha").value;

  if (senha === "29/12") {
    document.querySelector(".tela-login").style.display = "none";
    document.getElementById("site").style.display = "block";

    // música começa aqui (interação garantida)
    const musica = document.getElementById("musica");
    musica.volume = 0.4;
    musica.play().catch(()=>{});

  } else {
    document.getElementById("erro").innerText = "senha errada 😡";
  }
}

/* MENSAGEM */
function mostrarMsg() {
  const el = document.getElementById("msg2");
  el.style.display = el.style.display === "block" ? "none" : "block";
  el.innerText = "isso aqui é um checkpoint emocional do universo 💌";
}

/* ABRIR MODAL */
function abrir() {
  document.getElementById("modal").style.display = "flex";

  // garante que começa rodando
  pausado = false;
  atualizarStatus();

  iniciarTimer();

  // autoplay funcionando
  clearInterval(autoPlay);
  autoPlay = setInterval(avancar, 5000);

  atualizar();
}

/* FECHAR */
function fechar() {
  document.getElementById("modal").style.display = "none";

  clearInterval(autoPlay);
  clearInterval(timerInterval);
}

/* CARROSSEL */
function atualizar() {
  const carrossel = document.getElementById("carrossel");
  carrossel.style.transform = `translateX(${-index * 100}%)`;

  setTimeout(ativarTexto, 300);
}

function avancar() {
  const total = document.querySelectorAll(".foto").length;
  index = (index + 1) % total;
  atualizar();
}

function voltar() {
  const total = document.querySelectorAll(".foto").length;
  index = (index - 1 + total) % total;
  atualizar();
}

/* TEXTO */
function escrever(el, text, i = 0) {
  el.innerHTML = "";
  function loop() {
    if (i < text.length) {
      el.innerHTML += text[i++];
      setTimeout(loop, 30);
    }
  }
  loop();
}

function ativarTexto() {
  const fotos = document.querySelectorAll(".foto");
  const atual = fotos[index];
  const desc = atual.querySelector(".descricao");
  escrever(desc, desc.getAttribute("data-text"));
}

/* TIMER */
function iniciarTimer() {
  tempo = 0;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!pausado) {
      tempo++;
      document.getElementById("timer").innerText = "tempo: " + tempo + "s";
    }
  }, 1000);
}

/* STATUS */
function atualizarStatus() {
  const status = document.getElementById("status");
  const carrossel = document.getElementById("carrossel");

  if (pausado) {
    status.innerText = "⏸ PAUSED";
    carrossel.classList.add("paused");
  } else {
    status.innerText = "▶ PLAYING";
    carrossel.classList.remove("paused");
  }
}

/* PAUSE */
function togglePause() {
  const sound = document.getElementById("camera-sound");
  sound.currentTime = 0;
  sound.play();

  pausado = !pausado;

  if (pausado) {
    clearInterval(autoPlay);
  } else {
    autoPlay = setInterval(avancar, 5000);
  }

  atualizarStatus();
}

/* CLICK */
document.addEventListener("click", (e) => {
  const modal = document.getElementById("modal");

  if (modal.style.display === "flex") {
    if (!e.target.classList.contains("seta") && !e.target.classList.contains("fechar")) {
      togglePause();
    }
  }
});

/* TECLA ESPAÇO */
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault();
    togglePause();
  }
});

</script>
