    .esq { left: 10px; }

    #status {

      font-weight: bold;

    #timer {

<script>

let index = 0;
let autoPlay;
let pausado = false;
let tempo = 0;
let timerInterval;

/* LOGIN */
function entrar() {
  const senha = document.getElementById("senha").value;

  if (senha === "29/12") {
    document.querySelector(".tela-login").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    document.getElementById("erro").innerText = "senha errada 😡";
  }
}

/* ABRIR */
function abrir() {
  document.getElementById("modal").style.display = "flex";

  const musica = document.getElementById("musica");
  musica.volume = 0.4;
  musica.play();

  iniciarTimer();

  autoPlay = setInterval(avancar, 5000);
  atualizarStatus();
  ativarTexto();
}

/* FECHAR */
function fechar() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("musica").pause();

  clearInterval(autoPlay);
  clearInterval(timerInterval);
}

/* CARROSSEL */
function atualizar() {
  document.getElementById("carrossel")
    .style.transform = `translateX(${-index * 100}%)`;

  setTimeout(ativarTexto, 300);
}

function avancar() {
  const total = document.querySelectorAll(".foto").length;
  index = (index + 1) % total;
  atualizar();
}

function voltar() {
  const total = document.querySelectorAll(".foto").length;
  index = (index - 1 + total) % total;
  atualizar();
}

/* TEXTO ANIMADO */
function escrever(el, text, i = 0) {
  el.innerHTML = "";
  function loop() {
    if (i < text.length) {
      el.innerHTML += text[i++];
      setTimeout(loop, 30);
    }
  }
  loop();
}

function ativarTexto() {
  const atual = document.querySelectorAll(".foto")[index];
  const desc = atual.querySelector(".descricao");
  escrever(desc, desc.getAttribute("data-text"));
}

/* TIMER */
function iniciarTimer() {
  tempo = 0;
  clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    tempo++;
    document.getElementById("timer").innerText = "tempo: " + tempo + "s";
  }, 1000);
}

/* STATUS */
function atualizarStatus() {
  const status = document.getElementById("status");
  const carrossel = document.getElementById("carrossel");

  if (pausado) {
    status.innerText = "⏸ PAUSED";
    carrossel.classList.add("paused");
  } else {
    status.innerText = "▶ PLAYING";
    carrossel.classList.remove("paused");
  }
}

/* PAUSE */
function togglePause() {
  const sound = document.getElementById("camera-sound");
  sound.currentTime = 0;
  sound.play();

  if (pausado) {
    autoPlay = setInterval(avancar, 5000);
    pausado = false;
  } else {
    clearInterval(autoPlay);
    pausado = true;
  }

  atualizarStatus();
}

/* clique pausa */
window.addEventListener("load", () => {
  document.getElementById("modal").addEventListener("click", (e) => {
    if (!e.target.classList.contains("seta")) togglePause();
  });
});

/* espaço pausa */
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    e.preventDefault();
    togglePause();
  }
});

</script>
