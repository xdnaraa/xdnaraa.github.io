<!DOCTYPE html>
<html>
<head>
  <title>💌</title>
  <style>
    body {
      background: #000;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background: #ff4da6;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>feliz aniversário 🎂</h1>
  <p>tem uma coisa pra você aqui…</p>

  <button onclick="mostrar()">clica</button>

  <p id="msg" style="display:none; margin-top:20px;">
    você é muito especial pra mim 💖
  </p>

  <script>
    function mostrar() {
      document.getElementById("msg").style.display = "block";
    }
  </script>

</body>
</html>
